name: 이슈 브랜치 및 Draft PR 자동 생성

on:
  issues:
    types:
      - opened
      - labeled

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: auto-branch-pr-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  create-branch-and-pr:
    if: contains(github.event.issue.labels.*.name, 'feature') || contains(github.event.issue.labels.*.name, 'fix') || contains(github.event.issue.labels.*.name, 'refactor')
    runs-on: ubuntu-latest

    steps:
      - name: 기본 브랜치 체크아웃
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}

      - name: 브랜치 이름 생성
        id: branch
        shell: bash
        run: |
          ISSUE_NUMBER="${{ github.event.issue.number }}"
          ISSUE_TITLE="${{ github.event.issue.title }}"
          LABELS='${{ toJson(github.event.issue.labels.*.name) }}'

          if echo "$LABELS" | grep -q '"fix"'; then
            PREFIX="fix"
          elif echo "$LABELS" | grep -q '"refactor"'; then
            PREFIX="refactor"
          elif echo "$LABELS" | grep -q '"feature"'; then
            PREFIX="feature"
          else
            echo "지원하는 라벨이 없어 작업을 건너뜁니다."
            exit 1
          fi

          SLUG="$(echo "$ISSUE_TITLE" \
            | tr '[:upper:]' '[:lower:]' \
            | sed -E 's/[^a-z0-9]+/-/g; s/^-+//; s/-+$//; s/-{2,}/-/g' \
            | cut -c1-40)"

          if [ -z "$SLUG" ]; then
            SLUG="issue"
          fi

          BRANCH_NAME="${PREFIX}/${ISSUE_NUMBER}-${SLUG}"

          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "branch_name=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: 원격 브랜치 생성
        id: create_branch
        shell: bash
        run: |
          BRANCH_NAME="${{ steps.branch.outputs.branch_name }}"
          BASE_BRANCH="${{ github.event.repository.default_branch }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "$BRANCH_NAME" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git checkout -b "$BRANCH_NAME" "origin/$BASE_BRANCH"
          git commit --allow-empty -m "chore: 이슈 #${{ github.event.issue.number }} 브랜치 생성"
          git push origin "$BRANCH_NAME"

          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Draft PR 생성
        uses: actions/github-script@v7
        env:
          BRANCH_NAME: ${{ steps.branch.outputs.branch_name }}
          BASE_BRANCH: ${{ github.event.repository.default_branch }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const issue = context.payload.issue;
            const branchName = process.env.BRANCH_NAME;
            const baseBranch = process.env.BASE_BRANCH;

            const existing = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              head: `${context.repo.owner}:${branchName}`,
              base: baseBranch,
            });

            if (existing.data.length > 0) {
              core.info(`이미 열린 PR이 있습니다: ${branchName} -> #${existing.data[0].number}`);
              return;
            }

            let prTemplate = '## 📌 요약\n\n## 📚 변경 사항\n\n## 📝 참고 사항\n\n## 📌 관련 이슈\n- Closes #' + issue.number;
            const templatePath = path.join(process.env.GITHUB_WORKSPACE, '.github', 'PULL_REQUEST_TEMPLATE.md');
            if (fs.existsSync(templatePath)) {
              prTemplate = fs.readFileSync(templatePath, 'utf8').replace('Closes #', `Closes #${issue.number}`);
            }

            const issueBody = issue.body || '';
            const tasksMatch = issueBody.match(/##\s*📚\s*작업\s*목록[\s\S]*?(?=\n##\s|$)/);
            const tasksSection = tasksMatch ? tasksMatch[0].trim() : '- [ ] 작업 내용을 작성하세요';

            const prBody = [
              '## 자동 생성된 Draft PR',
              '',
              '연결된 이슈를 기준으로 자동 생성된 PR입니다.',
              '',
              '### 브랜치',
              `- \`${branchName}\``,
              '',
              '### 이슈 작업 목록',
              tasksSection,
              '',
              '---',
              '',
              prTemplate.trim(),
            ].join('\n');

            const { data: pr } = await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issue.title,
              head: branchName,
              base: baseBranch,
              body: prBody,
              draft: true,
            });

            if (issue.assignees?.length) {
              await github.rest.issues.addAssignees({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                assignees: issue.assignees.map((assignee) => assignee.login),
              });
            }

            if (issue.labels?.length) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr.number,
                labels: issue.labels.map((label) => label.name),
              });
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: [
                '브랜치와 Draft PR이 자동 생성되었습니다.',
                '',
                `- Branch: \`${branchName}\``,
                `- Draft PR: #${pr.number}`,
              ].join('\n'),
            });
